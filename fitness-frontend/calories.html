<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calories Intake</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0f1720;
color:white;
}

/* PHOTO */

.photo{
height:45vh;
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url("calorie.jpg");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
padding-left:80px;
}

.hero h1{
font-size:42px;
}

/* NAV */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 80px;
background:#0b0f14;
}

button{
padding:10px 22px;
border:none;
border-radius:20px;
background:#1e90ff;
color:white;
cursor:pointer;
}

/* SECTION */

.section{
padding:70px 90px;
}

/* CARD */

.card{
background:#1f2937;
padding:40px;
border-radius:15px;
max-width:700px;
margin:auto;
}

/* FORM */

select,input{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:20px;
border:none;
border-radius:10px;
}

/* TABLE */

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:#18202d;
border-radius:10px;
overflow:hidden;
}

th{
background:#1e90ff;
padding:12px;
}

td{
padding:12px;
text-align:center;
}

tr:nth-child(even){
background:#111827;
}

/* TOTAL */

.total{
text-align:center;
font-size:22px;
margin-top:20px;
color:#1e90ff;
}

.delete-btn{
background:red;
border:none;
padding:6px 14px;
border-radius:10px;
color:white;
cursor:pointer;
}

</style>

</head>

<body>




<section class="photo">

<h1>Track Your Daily Calories Intake</h1>

</section>




<div class="topbar">

<a href="main.html"><button>⬅ Back</button></a>

<button onclick="logout()">Logout</button>

</div>

<section class="section">

<div class="card">

<h2>Calorie Tracker</h2>

<form id="calorieForm">

<select id="foodSelect" onchange="setCalories()">
<option value="">--Choose Food--</option>

<option data-cal="200">Rice (1 bowl)</option>
<option data-cal="120">Roti</option>
<option data-cal="180">Dal</option>
<option data-cal="220">Paneer Curry</option>
<option data-cal="250">Chicken Curry</option>
<option data-cal="150">Samosa</option>
<option data-cal="300">Veg Biryani</option>
<option data-cal="350">Chicken Biryani</option>
<option data-cal="90">Idli</option>
<option data-cal="180">Dosa</option>
<option data-cal="78">Boiled Egg</option>
<option data-cal="150">Milk</option>
<option data-cal="105">Banana</option>
<option data-cal="95">Apple</option>
<option data-cal="250">Bread Butter</option>
<option data-cal="310">Maggi</option>
<option data-cal="220">Poha</option>
<option data-cal="270">Upma</option>
<option data-cal="285">Pizza Slice</option>
<option data-cal="320">Burger</option>
<option data-cal="365">French Fries</option>
<option data-cal="210">Sandwich</option>
<option data-cal="160">Oats</option>
<option data-cal="120">Salad</option>
<option data-cal="170">Peanut Butter</option>
</select>

<label>Calories</label>
<input type="number" id="calories" readonly>

<button type="submit">Add Food</button>

</form>

<h3>Today's Food</h3>

<table id="foodTable">

<thead>
<tr>
<th>Food</th>
<th>Calories</th>
<th>Action</th>
</tr>
</thead>

<tbody></tbody>

</table>

<div class="total">

Total Calories: <span id="totalCalories">0</span> kcal

</div>

</div>

</section>


<script>
let total = 0;

const userId = localStorage.getItem("userId");

function setCalories() {
  const s = document.getElementById("foodSelect");
  const cal = s.options[s.selectedIndex].getAttribute("data-cal");
  document.getElementById("calories").value = cal || "";
}

function addRow(item) {
  const tbody = document.querySelector("#foodTable tbody");
  const row = tbody.insertRow();

  row.insertCell(0).innerText = item.food;
  row.insertCell(1).innerText = item.calories + " kcal";

  const del = row.insertCell(2);
  const btn = document.createElement("button");
  btn.innerText = "Delete";
  btn.className = "delete-btn";

  btn.onclick = function () {
    fetch(`http://localhost:5000/api/calories/${item._id}`, {
      method: "DELETE"
    })
    .then(res => res.json())
    .then(() => {
      total -= item.calories;
      document.getElementById("totalCalories").innerText = total;
      row.remove();
    })
    .catch(err => {
      console.log(err);
      alert("Failed to delete calorie entry");
    });
  };

  del.appendChild(btn);

  total += item.calories;
  document.getElementById("totalCalories").innerText = total;
}

function loadCalories() {
  if (!userId) return;

  fetch(`http://localhost:5000/api/calories/${userId}`)
    .then(res => res.json())
    .then(data => {
      total = 0;
      document.querySelector("#foodTable tbody").innerHTML = "";
      data.forEach(item => addRow(item));
    })
    .catch(err => {
      console.log(err);
      alert("Failed to load calorie data");
    });
}

document.getElementById("calorieForm").addEventListener("submit", function (e) {
  e.preventDefault();

  const s = document.getElementById("foodSelect");
  const food = s.options[s.selectedIndex].text;
  const cal = parseInt(document.getElementById("calories").value);

  if (!cal) {
    alert("Select food first");
    return;
  }

  fetch("http://localhost:5000/api/calories/add", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      userId: userId,
      food: food,
      calories: cal
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.error) {
      alert(data.error);
      return;
    }

    loadCalories();
    this.reset();
    document.getElementById("calories").value = "";
  })
  .catch(err => {
    console.log(err);
    alert("Failed to save calorie entry");
  });
});

function logout() {
  sessionStorage.removeItem("loggedIn");
  localStorage.removeItem("userId");
  localStorage.removeItem("userName");
  window.location.href = "login.html";
}

loadCalories();
</script>

</body>
</html>
