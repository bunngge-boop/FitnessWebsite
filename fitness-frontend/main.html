<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitness Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="photo">

<header class="topbar">

<h1>Fitness Dashboard</h1>

<h2 id="welcome"></h2>

<button class="logout-btn" onclick="logout()">Logout</button>

</header>



<div class="navigation">

<ul>

<li class="active">
<a href="#">
<span class="icon">🏠</span>
<span class="text">Home</span>
</a>
</li>

<li><a href="workout.html"><span class="icon">🏋️</span><span class="text">Workout</span></a></li>
<li><a href="calories.html"><span class="icon">🔥</span><span class="text">Calories</span></a></li>
<li><a href="progress.html"><span class="icon">📊</span><span class="text">Progress</span></a></li>
<li><a href="profile1.html"><span class="icon">👤</span><span class="text">Profile</span></a></li>

<div class="indicator"></div>

</ul>

</div>


<div class="container">

<h2 class="title">Today's Fitness Summary</h2>

<div class="grid">



<div class="block">

<h3>Today's Steps</h3>

<p id="steps" class="big-number">0</p>

<button onclick="startTracking()">Start Tracking</button>
<button onclick="stopTracking()">Stop</button>
<button onclick="resetSteps()">Reset</button>

</div>



<div class="block">

<h3>Calories Burned</h3>

<p id="burned" class="big-number">0 kcal</p>

</div>



<div class="block">

<h3>Water Intake</h3>

<p id="waterText">0 / 8 glasses</p>

<div class="progress-bg">

<div id="waterBar" class="progress-bar"></div>

</div>

<br>

<button onclick="addWater()">+1 Glass</button>
<button onclick="resetWater()">Reset</button>

</div>

</div>

</div>


<footer>

<p>© Fitness Tracker</p>

</footer>

<script src="script.js"></script>

</body>
</html>
