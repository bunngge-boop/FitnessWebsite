<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Tracker</title>

<style>

/* PAGE BACKGROUND IMAGE */

.photo{
background:
linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.65)),
url("https://images.unsplash.com/photo-1534438327276-14e5300c3a48");
background-size:cover;
background-position:center;
min-height:100vh;
font-family:Segoe UI;
color:white;
}

/* TOP BAR */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 80px;
background:#0b0f14;
border-radius:15px;
}

header h1{
margin:0;
}

/* CONTAINER */

.container{
padding:60px 90px;
display:flex;
justify-content:center;
}

/* CARD */

.card{
background:#1f2937;
padding:40px;
border-radius:15px;
width:900px;
}

/* INPUTS */

select,input{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:18px;
border:none;
border-radius:10px;
}

/* BUTTONS */

button{
padding:10px 22px;
border:none;
border-radius:20px;
background:#1e90ff;
color:white;
cursor:pointer;
}

/* TABLE */

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:#18202d;
border-radius:10px;
overflow:hidden;
}

th{
background:#1e90ff;
padding:12px;
}

td{
padding:12px;
text-align:center;
}

tr:nth-child(even){
background:#111827;
}

/* DELETE BUTTON */

.delete-btn{
background:red;
border:none;
padding:6px 14px;
border-radius:10px;
color:white;
cursor:pointer;
}

/* PROGRESS BAR */

.progress-bg{
background:#444;
height:14px;
border-radius:10px;
}

.progress-bar{
height:14px;
width:0%;
background:linear-gradient(135deg,#007bff,#17a2b8);
border-radius:10px;
}

</style>
</head>

<body class="photo">

<header>

<h1>Workout Tracker</h1>

<div>
<a href="main.html"><button style="margin: 15px;">⬅ Back to Dashboard</button></a>
<button onclick="logout()">Logout</button>
</div>

</header>


<div class="container">

<section class="card">

<label>Set Daily Goal (kcal)</label>

<div style="display:flex;gap:10px;margin-bottom:20px;">
<input type="number" id="goalInput" placeholder="Enter goal (e.g. 500)" min="100">
<button type="button" onclick="setGoal()">Set Goal</button>
</div>

<h2>Log Workout</h2>

<form id="workoutForm">

<select id="workoutSelect">
<option value="">Choose Workout</option>
<option data-cal="8">Walking</option>
<option data-cal="10">Running</option>
<option data-cal="7">Cycling</option>
<option data-cal="6">Yoga</option>
<option data-cal="9">Skipping</option>
<option data-cal="5">Pushups</option>
<option data-cal="6">Gym Workout</option>
</select>

<label>Duration (minutes)</label>
<input type="number" id="minutes" placeholder="Enter minutes">

<label>Intensity</label>
<select id="intensity">
<option value="1">Easy</option>
<option value="1.2">Moderate</option>
<option value="1.5">Hard</option>
</select>

<button type="submit">Add Workout</button>

</form>

<h3>Today's Workouts</h3>

<table id="workoutTable">

<thead>
<tr>
<th>Workout</th>
<th>Minutes</th>
<th>Intensity</th>
<th>Calories</th>
<th>Time</th>
<th>Action</th>
</tr>
</thead>

<tbody></tbody>

</table>

<h2>Total Burned: <span id="totalBurned">0</span> kcal</h2>

<h3 id="goalText">Calories Burned: 0 / 0 kcal</h3>

<div class="progress-bg">
<div id="progressBar" class="progress-bar"></div>
</div>

</section>

</div>


<script>
let totalBurned = 0;
let goal = 0;

const userId = localStorage.getItem("userId");

function setGoal() {
  const val = parseInt(document.getElementById("goalInput").value);

  if (!val || val <= 0) {
    alert("Enter a valid goal");
    return;
  }

  goal = val;
  updateTotal();
}

function updateTotal() {
  document.getElementById("totalBurned").innerText = totalBurned;

  document.getElementById("goalText").innerText =
    "Calories Burned: " + totalBurned + " / " + goal + " kcal";

  if (goal > 0) {
    let percent = Math.min((totalBurned / goal) * 100, 100);
    document.getElementById("progressBar").style.width = percent + "%";
  } else {
    document.getElementById("progressBar").style.width = "0%";
  }
}

function addWorkoutRow(item) {
  const tbody = document.querySelector("#workoutTable tbody");
  const row = tbody.insertRow();

  row.insertCell(0).innerText = item.workout;
  row.insertCell(1).innerText = item.minutes;
  row.insertCell(2).innerText = item.intensity + "x";
  row.insertCell(3).innerText = item.calories + " kcal";
  row.insertCell(4).innerText = item.time || "-";

  const del = row.insertCell(5);
  const btn = document.createElement("button");
  btn.innerText = "Delete";
  btn.className = "delete-btn";

  btn.onclick = function () {
    fetch(`http://localhost:5000/api/workout/${item._id}`, {
      method: "DELETE"
    })
    .then(res => res.json())
    .then(() => {
      totalBurned -= item.calories;
      updateTotal();
      row.remove();
    })
    .catch(err => {
      console.log(err);
      alert("Failed to delete workout");
    });
  };

  del.appendChild(btn);

  totalBurned += item.calories;
  updateTotal();
}

function loadWorkouts() {
  if (!userId) return;

  fetch(`http://localhost:5000/api/workout/${userId}`)
    .then(res => res.json())
    .then(data => {
      totalBurned = 0;
      document.querySelector("#workoutTable tbody").innerHTML = "";
      data.forEach(item => addWorkoutRow(item));
    })
    .catch(err => {
      console.log(err);
      alert("Failed to load workouts");
    });
}

document.getElementById("workoutForm").addEventListener("submit", function (e) {
  e.preventDefault();

  const s = document.getElementById("workoutSelect");
  const workout = s.options[s.selectedIndex].text;
  const rate = parseInt(s.options[s.selectedIndex].getAttribute("data-cal"));
  const minutes = parseInt(document.getElementById("minutes").value);
  const intensity = Number(document.getElementById("intensity").value);

  if (!rate || !minutes) {
    alert("Select workout and minutes");
    return;
  }

  const burned = Math.round(rate * minutes * intensity);
  const now = new Date().toLocaleTimeString([], {
    hour: "2-digit",
    minute: "2-digit"
  });

  fetch("http://localhost:5000/api/workout/add", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      userId: userId,
      workout: workout,
      minutes: minutes,
      intensity: intensity,
      calories: burned,
      time: now
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.error) {
      alert(data.error);
      return;
    }

    loadWorkouts();
    this.reset();
  })
  .catch(err => {
    console.log(err);
    alert("Failed to save workout");
  });
});

function logout() {
  sessionStorage.removeItem("loggedIn");
  localStorage.removeItem("userId");
  localStorage.removeItem("userName");
  window.location.href = "login.html";
}

loadWorkouts();
</script>



</body>
</html>
