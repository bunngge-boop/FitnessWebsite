<!DOCTYPE html>
<html>
<head>
<title>User Info</title>

<style>

/* background */

.onboard{
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:'Segoe UI',sans-serif;
color:white;
}


/* title */

.title{
font-size:32px;
font-weight:800;
margin-bottom:25px;
text-align:center;
}


/* form card */

.form-card{
background:rgba(255,255,255,0.08);
padding:30px;
border-radius:18px;
width:420px;
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}


/* input fields */

.form-card input[type="text"]{
width:100%;
padding:14px;
margin-top:8px;
margin-bottom:18px;
border-radius:10px;
border:none;
background:#f2f2f2;
font-size:16px;
}


/* options */

.option{
display:flex;
align-items:center;
gap:10px;
background:#444;
padding:14px;
border-radius:12px;
margin-bottom:12px;
cursor:pointer;
transition:0.2s;
}

.option:hover{
background:#555;
}

.option input{
transform:scale(1.3);
}


/* button */

button{
width:100%;
margin-top:20px;
padding:16px;
border:none;
border-radius:30px;
background:linear-gradient(135deg,#00c6ff,#0072ff);
color:white;
font-weight:700;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 6px 20px rgba(0,0,0,0.4);
}

</style>

</head>

<body class="onboard">

<h1 class="title">LET'S GET TO KNOW YOU</h1>

<div class="form-card">

<label>First Name</label>
<input type="text" id="fname" placeholder="Enter first name">

<label>Last Name</label>
<input type="text" id="lname" placeholder="Enter last name">

<h3>Your Sex</h3>

<label class="option">
<input type="radio" name="sex" value="Female">
Female
</label>

<label class="option">
<input type="radio" name="sex" value="Male">
Male
</label>

<label class="option">
<input type="radio" name="sex" value="Other">
Other
</label>

<button onclick="saveUser()">CONTINUE</button>

</div>

<script>
const userId = localStorage.getItem("userId");

if (!userId) {
  alert("Please login first");
  window.location.href = "login.html";
}

function loadUserProfile() {
  if (!userId) return;

  fetch(`http://fitnesswebsite-1nkt.onrender.com/api/auth/profile/${userId}`)
    .then(res => res.json())
    .then(data => {
      if (data.error) return;

      if (data.fname) {
        document.getElementById("fname").value = data.fname;
      }

      if (data.lname) {
        document.getElementById("lname").value = data.lname;
      }

      if (data.sex) {
        const sexOption = document.querySelector(`input[name="sex"][value="${data.sex}"]`);
        if (sexOption) {
          sexOption.checked = true;
        }
      }
    })
    .catch(err => {
      console.log(err);
    });
}

function saveUser() {
  const fname = document.getElementById("fname").value.trim();
  const lname = document.getElementById("lname").value.trim();
  const sex = document.querySelector('input[name="sex"]:checked')?.value;

  if (!fname || !lname || !sex) {
    alert("Please fill all fields");
    return;
  }

  fetch(`http://fitnesswebsite-1nkt.onrender.com/api/auth/profile/${userId}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      fname,
      lname,
      sex
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.error) {
      alert(data.error);
      return;
    }

    localStorage.setItem("loggedIn", "true");
    localStorage.setItem("fname", fname);
    localStorage.setItem("lname", lname);
    localStorage.setItem("sex", sex);

    window.location.href = "main.html";
  })
  .catch(err => {
    console.log(err);
    alert("Failed to save profile");
  });
}

loadUserProfile();
</script>

</body>
</html>
